services:
  postgres:
    image: postgres:15
    container_name: meu-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: senha_super_segura
      POSTGRES_DB: api_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  api:
    build: .
    container_name: hashtalk-api
    environment:
      DATABASE_URL: postgresql://admin:senha_super_segura@postgres:5432/api_db?schema=public
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      JWT_SECRET: ${JWT_SECRET:-hashTalk_secret_key_2026}
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      - postgres
    restart: always

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: hashtalk-cloudflared
    command: tunnel --url http://api:3000
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
